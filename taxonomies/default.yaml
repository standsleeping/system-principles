name: default
description: Organized by activity flow, from process through implementation to verification and presentation.
groups:
  process:
    description: >-
      The meta principle. Gall's law reigns; incremental full passes from idea to implementation with vertical slices.
    principles:
    - START_SIMPLE

  conceptual:
    description: >-
      Naming, separating, untangling, and designing.
    principles:
    - ENTANGLEMENT_NOT_HIDING
    - REDUCE_INTERLEAVING
    - REASSEMBLY
    - UNTANGLE_ASPECTS
    - NAME_ASPECTS
    - STRUCTURE_REFLECTS_CHANGE
    - MODULES_HIDE_DECISIONS
    - DESIGN_NOT_WORKFLOW
    - DESIGN_FRAMEWORK
    - PROVIDE_MORE_REQUIRE_LESS
    - ACCRETION_AND_RELAXATION
    - STRENGTHEN_OUTPUTS
    - RELAX_INPUTS

  modeling:
    description: >-
      What you choose to model, record, remember, store, or persist from the world.
      Representing domain: data, types, and state.
    principles:
    - DEPEND_ON_VALUES
    - STATE_ENTANGLES_TIME
    - STORE_FACTS_WITH_TIME
    - TIME_DEPENDENT_RESULTS
    - STATELESS_DESIGN
    - EVENT_SOURCING
    - DATABASE_AS_TRUTH
    - TRACEABILITY
    - TIME_TRAVEL

  structure:
    description: >-
      Where our constructs are located both logically and physically.
      Organizing code: architecture, boundaries, and modules.
    principles:
    - DATA_AT_ROOT
    - FUNCTIONS_IN_SUBDIR
    - ONE_TO_ONE_TO_ONE
    - UNITS
    - INTEGRATORS
    - ACTIONS
    - TRANSLATORS
    - TRANSLATOR_FUNCTIONS
    - PURE_CONVERSION_ONLY

  types:
    description: >-
      How we design types downstream of our conceptual, modeling, and structure choices.
      Good models make illegal states unrepresentable and carry proofs forward in types.
    principles:
    - ILLEGAL_STATES_UNREPRESENTABLE
    - TYPES_AS_BOUNDARIES
    - PRECISION_MATCHES_STABILITY
    - CHASE_CHECKS_UPSTREAM
    - STRENGTHEN_INPUTS
    - REFINED_TYPES_PROPAGATE_PROOFS
    - PARSE_INTO_STRONGER_TYPES
    - PATTERN_MATCH_TO_REFINE
    - VALIDATE_AT_BOUNDARIES
    - ACCEPTABLE_BOOLS
    - INTERCHANGE_AT_BOUNDARIES
    - DOMAIN_TYPES_INTERNAL
    - SHAPE_NOT_INVARIANTS
    - INCLUDE_TEMPORAL_INFO

  constructs:
    description: >-
      How we implement our concepts, models, packages, modules, functions, and types.
      Linter-catchable rules andpatterns.
    principles:
    - WORKING_MEMORY_LIMIT
    - FUNCTIONAL_PATTERNS
    - ENUMS_OVER_BOOLEANS
    - AVOID_RETURNING_BOOL
    - FIX_UPSTREAM_TYPE
    - DOMAIN_TYPE_SAFETY
    - NO_KNOWLEDGE_AS_CONTROL_FLOW
    - HOIST_DECISIONS
    - DECISIONS_AS_DATA
    - ENCODE_PREDICATES
    - SEPARATE_DECISIONS_BEHAVIOR
    - DATA_DRIVEN_DISPATCH
    - PATTERN_MATCH_AT_BOUNDARIES
    - ALA_CARTE_POLYMORPHISM
    - NO_DEPS_IN_DISPATCH
    - MANAGE_EXHAUSTIVENESS
    - TRANSLATORS_BRIDGE_GAP
    - CONVERT_NEVER_OPERATE
    - EXPLICIT_ERROR_VALUES
    - VALIDATE_STRUCTURE_ONLY
    - UNIT_TRANSLATORS_SELF_CONTAINED
    - INTEGRATOR_TRANSLATORS_COMPOSE
    - CHAIN_WITH_ERROR_PROPAGATION
    - ONE_TRANSLATOR_PER_BOUNDARY
    - DOMAIN_TO_EXTERNAL_LANGUAGE
    - CROSS_DOMAIN_ENFORCE_RULES
    - INJECT_TRANSLATORS
    - TRANSLATORS_IN_HANDLERS
    - CONSISTENT_ERROR_TYPES

  testing:
    description: >-
      Strict rules for testing and mocking. Good tests evaluate design quality
      and focus on boundaries.
    principles:
    - TESTS_EVALUATE_DESIGN
    - MOCKING_INDICATES_PROBLEMS
    - TEST_FIRST
    - FUNCTIONAL_TESTING
    - DECLARATIVE_TEST_DOCS
    - NEVER_MOCK_APP_CODE
    - MOCK_EXTERNAL_ONLY
    - PURPOSE_BUILT_DOUBLES

  layout:
    description: >-
      Rules for visual layout and structure. Layout principles govern the structural
      arrangement of UI components: where content lives, what contains what, and how
      space is allocated.
    principles:
    - NO_PAGE_SCROLL
    - VIEWPORT_LOCKED
    - FIXED_FLEXIBLE_REGIONS
    - SCROLL_CONTAINMENT
    - BOUNDARY_OWNERSHIP
    - EMPTY_STATE_COLLAPSE
    - LAYOUT_VARIANTS
    - NEVER_CALC_LAYOUT
    - LAYOUT_QUIRKS
    - OVERFLOW_CAUSES

  visual-design:
    description: >-
      Rules for visual design and aesthetics. How interfaces look, how hierarchy is
      communicated, and how users perceive structure through typography, color, and spacing.
    principles:
    - RESET_FIRST
    - TOKEN_DRIVEN_DESIGN
    - TYPOGRAPHY_HIERARCHY
    - SPACING_STRATEGY
    - COLOR_USAGE
    - TRANSPARENT_DEFAULT
    - MINIMAL_BORDERS
    - SIMPLIFICATION_PATTERNS
    - ONE_SIGNAL_PER_MEANING
    - DATA_INK_RATIO
    - FOCUS_STATES
    - RESPONSIVE_COMPONENTS

  ui-debugging:
    description: >-
      Principles that guide how to effectively debug HTML/JS/CSS. Tools and techniques
      for verifying UI constraints, debugging layout issues, and maintaining visual consistency.
    principles:
    - AUTO_VERIFICATION
    - DEV_WORKFLOW
    - CONTINUOUS_MONITORING
    - OVERFLOW_DETECTION
    - ANCESTRY_TRACING
    - DIAGNOSTIC_OUTPUT
    - PRESENT_RESULTS
    - VISUAL_DEBUGGING
    - TEST_INTEGRATION
    - HEADLESS_DEBUGGING
    - COMPONENT_PREVIEW
    - WIDTH_CONTROLLED_TESTING
    - VARIANT_BASED_TESTING
    - RESPONSIVE_STRATEGY
    - BROWSER_AUTOMATION
